services:
  food-diary:
    image: abeggi/food-diary:latest
    container_name: food-diary
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./static/firebase-config.js:/app/static/firebase-config.js:ro
    env_file:
      - .env
    # .env DEVE contenere: ADMIN_EMAIL, FIREBASE_SERVICE_ACCOUNT_JSON, GEMINI_API_KEY
    restart: unless-stopped
