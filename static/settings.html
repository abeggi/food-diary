<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostazioni - Food Diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<style>
  :root {
    --bg:        #0d0f0e;
    --surface:   #141714;
    --surface2:  #1b1e1b;
    --border:    #252825;
    --border2:   #2e332e;
    --text:      #d4d9d4;
    --text-dim:  #6b736b;
    --text-faint:#3a3f3a;
    --accent:    #6b9fff;
    --accent-dim:#2d5a9e;
    --accent-bg: #0f1e37;
    --red:       #e07070;
    --red-bg:    #2e1a1a;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
    --radius:    8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 58px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--mono);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: .02em;
    color: var(--accent);
  }
  .logo span { color: var(--text-dim); font-weight: 300; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .05em;
    padding: 5px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  
  .section-title {
    font-family: var(--sans);
    font-size: 21px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.02em;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .export-actions {
    display: flex;
    gap: 16px;
  }

  .btn-border {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 24px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-border:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* ── Entry list ── */
  .entries-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entry-row {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    align-items: start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color .15s;
  }
  .entry-row:hover { border-color: var(--border2); }
  .entry-time {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    padding-top: 2px;
  }
  .entry-food {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
    letter-spacing: -.01em;
  }
  .entry-notes {
    font-size: 13px;
    color: #a0a6a0;
    margin-top: 3px;
    font-style: italic;
    font-weight: 300;
  }
  .entry-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .entry-row:hover .entry-actions { opacity: 1; }
  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
    line-height: 1;
  }
  .btn-icon:hover { border-color: var(--accent-dim); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .entry-cat {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 2px;
    letter-spacing: .05em;
  }

  /* categories chips for edit */
  .cat-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
  .cat-chip {
    padding: 4px 10px;
    border-radius: 14px;
    border: 1px solid var(--border2);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .05em;
    cursor: pointer;
    color: var(--text-dim);
    transition: all .15s;
  }
  .cat-chip:hover { border-color: var(--accent-dim); color: var(--accent); }
  .cat-chip.active { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); }

  /* inline edit */
  .entry-row.editing { border-color: var(--accent-dim); background: var(--accent-bg); }
  .edit-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 165px 1fr;
    gap: 8px;
    margin-top: 6px;
  }
  input[type="text"], input[type="datetime-local"], input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent-dim); }
  input[type="datetime-local"] { color-scheme: dark; }

  .edit-row input { font-size: 13px; }
  .edit-actions { display: flex; gap: 6px; margin-top: 8px; grid-column: 1 / -1; }
  .btn-sm {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid;
    transition: all .12s;
  }
  .btn-sm.save { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); }
  .btn-sm.save:hover { background: var(--accent-dim); }
  .btn-sm.cancel { background: none; border-color: var(--border2); color: var(--text-dim); }
  .btn-sm.cancel:hover { border-color: var(--text-dim); color: var(--text); }
  
  /* search box */
  .search-wrap {
    margin-bottom: 16px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 18px;
    border-radius: var(--radius);
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { border-color: var(--accent-dim); color: var(--accent); }
  #toast.err { border-color: var(--red); color: var(--red); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 768px) {
    header { padding: 0 16px; }
    .main { padding: 20px 16px; }
    .entry-row {
      grid-template-columns: 140px 1fr auto;
      gap: 10px;
      padding: 12px 14px;
    }
    .entry-actions { opacity: 1; }
    .edit-row { grid-template-columns: 1fr; }
    #toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }
  }
</style>
</head>
<body>
<div class="shell">
  <!-- Header -->
  <header>
    <div class="logo">food<span>://</span>diary</div>
    <div class="header-actions">
      <a class="btn-ghost" href="/">← Home</a>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <section>
      <h2 class="section-title">Esporta Dati</h2>
      <div class="export-actions">
        <button class="btn-border" onclick="exportData('csv')">Esporta in CSV</button>
        <button class="btn-border" onclick="exportData('json')">Esporta in JSON</button>
      </div>
    </section>

    <section>
      <h2 class="section-title">Database Voci</h2>
      <div class="search-wrap">
        <input type="search" id="search-entries" placeholder="Cerca nel database..." oninput="onSearch()">
      </div>
      <div class="entries-wrap" id="entries-wrap">
        <div style="text-align: center; color: var(--text-dim); padding: 40px; font-family: var(--mono);">Caricamento voci...</div>
      </div>
    </section>
  </main>
</div>

<div id="toast"></div>

<script>
let allEntries = [];
let editingId = null;

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadAll();
});

async function loadAll() {
  try {
    allEntries = await api('GET', '/api/entries?limit=1000');
    renderEntries();
  } catch(e) {
    document.getElementById('entries-wrap').innerHTML = `<div style="text-align: center; color: var(--red); padding: 40px; font-family: var(--mono);">Errore caricamento. Riprova.</div>`;
    toast('Errore caricamento', 'err');
  }
}

// ── Render Entries ────────────────────────────────────────────────────────────
function renderEntries(filter = '') {
  const wrap = document.getElementById('entries-wrap');
  let data = allEntries;
  
  if (filter) {
    const q = filter.toLowerCase();
    data = data.filter(e => 
      e.food.toLowerCase().includes(q) || 
      (e.notes && e.notes.toLowerCase().includes(q)) ||
      (e.cat && e.cat.toLowerCase().includes(q)) ||
      e.ts.includes(q)
    );
  }

  if (!data.length) {
    wrap.innerHTML = `<div style="text-align: center; color: var(--text-dim); padding: 40px; font-family: var(--mono);">Nessuna voce trovata</div>`;
    return;
  }

  wrap.innerHTML = data.map(e => entryHTML(e)).join('');
}

function onSearch() {
  const q = document.getElementById('search-entries').value;
  renderEntries(q);
}

function entryHTML(e) {
  const d = new Date(e.ts);
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  
  const cat = e.cat ? `<div class="entry-cat">${esc(e.cat)}</div>` : '';
  const notes = e.notes ? `<div class="entry-notes">${esc(e.notes)}</div>` : '';
  return `<div class="entry-row" id="entry-${e.id}">
    <div class="entry-time">${dateStr}</div>
    <div>
      ${cat}
      <div class="entry-food">${esc(e.food)}</div>
      ${notes}
    </div>
    <div class="entry-actions">
      <button class="btn-icon" onclick="startEdit(${e.id})" title="modifica">✎</button>
      <button class="btn-icon del" onclick="deleteEntry(${e.id})" title="elimina">✕</button>
    </div>
  </div>`;
}

// ── Edit logic ────────────────────────────────────────────────────────────────
function selectCat(cat, id) {
  const hidden = document.getElementById(`edit-cat-inp-${id}`);
  hidden.value = hidden.value === cat ? '' : cat;
  
  const container = document.getElementById(`edit-cat-selector-${id}`);
  container.querySelectorAll('.cat-chip').forEach(chip => {
    if (chip.textContent.trim() === hidden.value) chip.classList.add('active');
    else chip.classList.remove('active');
  });
}

function startEdit(id) {
  if (editingId) cancelEdit(editingId);
  editingId = id;
  const entry = allEntries.find(e => e.id === id);
  const row   = document.getElementById(`entry-${id}`);
  
  const d = new Date(entry.ts);
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  
  row.classList.add('editing');
  row.innerHTML = `
    <div class="entry-time">${dateStr}</div>
    <div><div class="entry-food">${esc(entry.food)}</div></div>
    <div></div>
    <div class="edit-row">
      <input type="datetime-local" id="edit-ts-${id}" value="${entry.ts}">
      <input type="text" id="edit-food-${id}" value="${esc(entry.food)}">
    </div>
    <div class="edit-row" style="margin-top:0">
      <input type="text" id="edit-notes-${id}" placeholder="quantità" value="${esc(entry.notes||'')}">
      <div></div>
    </div>
    <div class="edit-row" style="margin-top:0">
      <div>
        <div class="cat-selector" id="edit-cat-selector-${id}">
          <div class="cat-chip ${entry.cat==='colazione'?'active':''}" onclick="selectCat('colazione', ${id})">colazione</div>
          <div class="cat-chip ${entry.cat==='pranzo'?'active':''}" onclick="selectCat('pranzo', ${id})">pranzo</div>
          <div class="cat-chip ${entry.cat==='snack'?'active':''}" onclick="selectCat('snack', ${id})">snack</div>
          <div class="cat-chip ${entry.cat==='cena'?'active':''}" onclick="selectCat('cena', ${id})">cena</div>
          <div class="cat-chip ${entry.cat==='dopocena'?'active':''}" onclick="selectCat('dopocena', ${id})">dopocena</div>
        </div>
        <input type="hidden" id="edit-cat-inp-${id}" value="${esc(entry.cat||'')}">
      </div>
    </div>
    <div class="edit-actions" style="grid-column:1/-1">
      <button class="btn-sm save" onclick="saveEdit(${id})">salva</button>
      <button class="btn-sm cancel" onclick="cancelEdit(${id})">annulla</button>
    </div>`;
  document.getElementById(`edit-food-${id}`).focus();
}

async function saveEdit(id) {
  const ts    = document.getElementById(`edit-ts-${id}`).value;
  const food  = document.getElementById(`edit-food-${id}`).value.trim();
  const notes = document.getElementById(`edit-notes-${id}`).value.trim();
  const cat   = document.getElementById(`edit-cat-inp-${id}`).value;
  if (!food) { toast('Il campo cibo non può essere vuoto', 'err'); return; }
  try {
    const updated = await api('PUT', `/api/entries/${id}`, { ts, food, notes, cat });
    const idx = allEntries.findIndex(e => e.id === id);
    if (idx >= 0) allEntries[idx] = updated;
    editingId = null;
    const q = document.getElementById('search-entries').value;
    renderEntries(q);
    toast('salvato ✓', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

function cancelEdit(id) {
  editingId = null;
  const q = document.getElementById('search-entries').value;
  renderEntries(q);
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteEntry(id) {
  if (!confirm('Sei sicuro di voler eliminare questa voce?')) return;
  try {
    await api('DELETE', `/api/entries/${id}`);
    allEntries = allEntries.filter(e => e.id !== id);
    const q = document.getElementById('search-entries').value;
    renderEntries(q);
    toast('eliminato ✓', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportData(fmt) {
  window.location.href = `/api/export/${fmt}`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
